name: jalplay
description: "JAL Play - Reprodutor de MP3 clássico estilo iPod para Android"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Audio playback
  just_audio: ^0.9.43
  audio_session: ^0.1.21
  audio_service: ^0.18.15

  # Media library query
  on_audio_query: ^2.9.0

  # Permissions
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI helpers
  battery_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
